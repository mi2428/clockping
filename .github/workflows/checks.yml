name: PR Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  workflow:
    name: Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy --component rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust build outputs
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ github.job }}-target-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-target-

      - name: Check formatting
        run: make fmt CHECK_ONLY=1

      - name: Run clippy
        run: make lint

      - name: Build rustdoc
        run: make doc

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            pkg-config

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust build outputs
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ github.job }}-target-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-target-

      - name: Run unit tests
        run: make test

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build integration image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: integration-test
          tags: clockping-test:latest
          load: true
          cache-from: type=gha,scope=clockping-integration
          cache-to: type=gha,mode=max,scope=clockping-integration

      - name: Build release smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: release
          tags: clockping:release-smoke-ci
          load: true
          cache-from: type=gha,scope=clockping-release
          cache-to: type=gha,mode=max,scope=clockping-release

      - name: Smoke release image
        run: docker run --rm clockping:release-smoke-ci --version

      - name: Run integration tests
        run: make integration

  dist:
    name: Dist
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: linux-amd64
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: linux-arm64
    env:
      LINUX_BUILD_IMAGE: rust:1.95-bookworm
      LINUX_CACHE_KEY: rust-1.95-bookworm
      LINUX_SMOKE_IMAGE: debian:bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Docker versions
        run: docker version

      - name: Cache Linux dist build outputs
        uses: actions/cache@v5
        with:
          path: |
            .cargo-linux/${{ matrix.arch }}
            target/linux-${{ matrix.arch }}-${{ env.LINUX_CACHE_KEY }}
          key: ${{ runner.os }}-${{ matrix.arch }}-${{ env.LINUX_CACHE_KEY }}-dist-${{ hashFiles('rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-${{ env.LINUX_CACHE_KEY }}-dist-

      - name: Build Linux dist binary
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -Eeuo pipefail

          mkdir -p "dist" ".cargo-linux/${ARCH}" ".home-linux/${LINUX_CACHE_KEY}/${ARCH}"
          host_uid="$(id -u)"
          host_gid="$(id -g)"

          docker run --rm \
            --platform "${PLATFORM}" \
            -e "HOME=/workspace/.home-linux/${LINUX_CACHE_KEY}/${ARCH}" \
            -e "CARGO_HOME=/workspace/.cargo-linux/${ARCH}" \
            -e "CARGO_TARGET_DIR=/workspace/target/linux-${ARCH}-${LINUX_CACHE_KEY}" \
            -v "${PWD}:/workspace" \
            -w /workspace \
            "${LINUX_BUILD_IMAGE}" \
            bash -eu -o pipefail -c " \
              cargo build --locked --release; \
              cp target/linux-${ARCH}-${LINUX_CACHE_KEY}/release/clockping dist/clockping-${SUFFIX}; \
              chmod +x dist/clockping-${SUFFIX}; \
              chown -R ${host_uid}:${host_gid} dist target/linux-${ARCH}-${LINUX_CACHE_KEY} .cargo-linux/${ARCH} .home-linux/${LINUX_CACHE_KEY}/${ARCH}"

      - name: Smoke Linux dist binary
        env:
          PLATFORM: ${{ matrix.platform }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -Eeuo pipefail

          docker run --rm \
            --platform "${PLATFORM}" \
            -v "${PWD}:/workspace:ro" \
            -w /workspace \
            "${LINUX_SMOKE_IMAGE}" \
            "/workspace/dist/clockping-${SUFFIX}" --help >/dev/null

          docker run --rm \
            --platform "${PLATFORM}" \
            -v "${PWD}:/workspace:ro" \
            -w /workspace \
            "${LINUX_SMOKE_IMAGE}" \
            "/workspace/dist/clockping-${SUFFIX}" --version >/dev/null

  required:
    name: Required
    runs-on: ubuntu-latest
    needs:
      - workflow
      - lint
      - test
      - integration
      - dist
    if: always()
    steps:
      - name: Require all checks
        run: |
          test "${{ needs.workflow.result }}" = "success"
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.integration.result }}" = "success"
          test "${{ needs.dist.result }}" = "success"
